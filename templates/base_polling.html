{% extends "base.html" %}

{% block title %}{% endblock %}

{% block content %}{% endblock %}

{% block scripts %}

  <script defer>
    window.APP_POLL_INTERVAL_MS = 500;

    let lastEventId = parseInt(localStorage.getItem("lastEventId")) || 0;
    let pollingStarted = false;
    const normalize = (url) => url.replace(/\/+$/, "");

    function fetchWithTimeout(url, timeout = 5000) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout);

      return fetch(url, { signal: controller.signal })
        .finally(() => clearTimeout(id));
    }

    async function loadGameState() {
      try {
        const res = await fetchWithTimeout("/api/state");

        if (!res.ok) return;

        const data = await res.json();

        if (data.error) {
          const app = document.getElementById("app");
          if (app) app.innerText = "Brak sesji!";
          return;
        }

        if (data.event_id !== lastEventId) {
          localStorage.setItem("lastEventId", data.event_id);

          if (data.url) {
            const currentUrl = normalize(window.location.pathname + window.location.search);
            const targetUrl = normalize(data.url);

            if (currentUrl !== targetUrl) {
              window.location.replace(data.url);
            }
          }

          if (window.onStatusUpdate) {
            window.onStatusUpdate(data);
          }
          if (window.onAdminStatusUpdate) {
            window.onAdminStatusUpdate(data);
          }

        }
      } catch (e) {
        console.warn("Polling error:", e);
      }
    }

    async function poll() {
      if (pollingStarted) return;
      pollingStarted = true;

      // pierwsze pobranie od razu
      await loadGameState();

      while (true) {
        await new Promise(r => setTimeout(r, window.APP_POLL_INTERVAL_MS));
        await loadGameState();
      }
    }

    window.addEventListener("DOMContentLoaded", poll);
  </script>

{% endblock %}
