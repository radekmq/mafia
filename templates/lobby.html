{% extends "base.html" %}

{% block title %}Blood on the clocktower – Czekanie na graczy{% endblock %}

{% block content %}

<div class="container">
  <h3>Oczekiwanie na rozpoczęcie gry!</h3>

  <div style="overflow-x:auto;">
    <p id="greetings">{{room_status}}</p>
    <p id="game_status">{{game_status}}</p>
    <p id="errorMsg" style="color: red; font-weight: bold;"></p>

    <table>
      <tr>
        <td>Aktualna liczba graczy:</td>
        <td><p id="no_of_player" style="text-align: center;">{{no_of_player}}</p></td>
      </tr>
    </table>

    <button type="button" data-href="{{ url_for('handle_wiki', back='lobby') }}"
      onclick="window.location.href=this.dataset.href">
      Wiki z listą postaci
    </button>

    <button type="button" onclick="leaveGame()">Opuść grę</button>
  </div>

<script>
  function applyGameStatus(data) {
    if ("no_of_players" in data) {
      document.getElementById("no_of_player").textContent = data.no_of_players;
    }

    if ("game_status" in data) {
      document.getElementById("game_status").textContent = data.game_status;
    }

    if (data.char_presented === true) {
      window.location.href = "/player_page";
    }
  }

  function initSocket() {
    if (!window.socket) {
      console.warn("Socket.IO not available - fallback to polling");
      return;
    }

    window.socket.on("update_game_status", (data) => {
      applyGameStatus(data);
    });
  }

  async function pollGameStatus() {
    try {
      const res = await fetch("/game-status", { cache: "no-store" });
      if (!res.ok) return;

      const data = await res.json();
      applyGameStatus(data);

    } catch (err) {
      console.warn("Polling failed:", err);
    }
  }

  async function leaveGame() {
    const errorMsg = document.getElementById("errorMsg");
    errorMsg.textContent = "";

    try {
      const response = await fetch("/leave-game", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" }
      });

      if (!response.ok) {
        const res = await response.json();
        errorMsg.textContent = res.error || "Nie udało się opuścić gry.";
        return;
      }

      if (response.redirected) {
        window.location.href = response.url;
      }

    } catch (err) {
      console.error(err);
      errorMsg.textContent = "Błąd połączenia z serwerem.";
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    initSocket();

    pollGameStatus();
    setInterval(pollGameStatus, 2000);
  });
</script>

{% endblock %}
