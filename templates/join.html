{% extends "base.html" %}

{% block title %}Blood on the clocktower – Dołącz do gry{% endblock %}

{% block content %}
  <h3>Dołącz do istniejącego pokoju</h3>

  <label for="room_name">Nazwa pokoju:</label><br>
  <input id="room_name" placeholder="Nazwa pokoju"><br><br>
  <button id="joinBtn">Dołącz do gry</button><br><br>
  <button id="menuBtn" onclick="window.location.href='/menu'">Go to menu</button></br></br>

  <p id="errorMsg" style="color: red; font-weight: bold;"></p>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const joinBtn = document.getElementById("joinBtn");
      const inputRoom = document.getElementById("room_name");
      const errorMsg = document.getElementById("errorMsg");

      joinBtn.addEventListener("click", async () => {
        const room_name = inputRoom.value.trim();

        errorMsg.textContent = "";

        if (!room_name) {
          errorMsg.textContent = "Podaj nazwę pokoju, aby dołączyć.";
          return;
        }

        const data = { room_name };

        try {
          const response = await fetch("/join", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams(data)
          });

          if (!response.ok) {
            const res = await response.json().catch(() => ({}));
            errorMsg.textContent = res.error || "Nie udało się dołączyć do pokoju.";
            return;
          }

          if (response.redirected) {
            window.location.href = response.url;
          }
        } catch (err) {
          console.error(err);
          errorMsg.textContent = "Błąd połączenia z serwerem.";
        }
      });
    });
  </script>
{% endblock %}
