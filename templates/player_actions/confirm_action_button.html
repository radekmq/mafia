{% if current_mode == "night" %}
<div style="margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap;">
  <button id="confirmNightActionBtn" class="inactive-btn" type="button" {% if action_confirmed_night or action_confirmation_locked|default(false) %}disabled{% endif %}>
    Potwierdź wykonanie akcji
  </button>
</div>

<script id="confirmActionState" type="application/json">
  {{ {"actionConfirmed": action_confirmed_night, "confirmationLocked": action_confirmation_locked|default(false)} | tojson }}
</script>

<script>
  (() => {
    const confirmBtn = document.getElementById("confirmNightActionBtn");
    const confirmInfo = document.getElementById("confirmNightActionInfo");
    const confirmActionState = JSON.parse(document.getElementById("confirmActionState")?.textContent || "{}");
    let actionAlreadyConfirmed = Boolean(confirmActionState.actionConfirmed);
    let confirmationLocked = Boolean(confirmActionState.confirmationLocked);

    if (!confirmBtn) return;

    function applyConfirmationButtonState() {
      confirmBtn.disabled = Boolean(actionAlreadyConfirmed || confirmationLocked);
    }

    function applyStatusPayload(status) {
      if (!status) return;

      if (typeof status.action_confirmation_locked !== "undefined") {
        confirmationLocked = Boolean(status.action_confirmation_locked);
      }

      if (Array.isArray(status.night_action_confirmations) && window.clientId) {
        const ownRow = status.night_action_confirmations.find(
          row => row && row.client_id === window.clientId
        );
        if (ownRow) {
          actionAlreadyConfirmed = Boolean(ownRow.confirmed);
        }
      }

      applyConfirmationButtonState();
    }

    async function confirmAction() {
      if (confirmBtn.disabled) return;
      try {
        const response = await fetch("/confirm-action", { method: "POST" });
        const data = await response.json();

        if (!response.ok) {
          console.warn(data.error || "Nie udało się potwierdzić akcji.");
          return;
        }

        actionAlreadyConfirmed = true;
        applyConfirmationButtonState();
        if (confirmInfo) {
          confirmInfo.textContent = "Potwierdzenie akcji: TAK";
        }
      } catch (err) {
        console.warn("Błąd połączenia z serwerem.");
      }
    }

    async function refreshConfirmationLockStatus() {
      try {
        const response = await fetch("/game-status", { cache: "no-store" });
        if (!response.ok) return;
        const data = await response.json();
        applyStatusPayload(data);
      } catch (err) {
        console.warn("Nie udało się pobrać statusu blokady potwierdzeń.");
      }
    }

    function attachSocketEvents() {
      const socket = window.socket || null;
      if (!socket) {
        setTimeout(attachSocketEvents, 200);
        return;
      }

      socket.on("update_game_status", applyStatusPayload);
    }

    confirmBtn.addEventListener("click", confirmAction);
    applyConfirmationButtonState();
    refreshConfirmationLockStatus();
    attachSocketEvents();
    setInterval(refreshConfirmationLockStatus, window.APP_POLL_INTERVAL_MS);
  })();
</script>
{% endif %}
