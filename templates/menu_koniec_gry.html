{% extends "base.html" %}

{% block title %}Koniec gry{% endblock %}

{% block content %}
<div class="container" style="max-width: 860px; text-align: center;">
  <h2 style="margin-top: 0;">Koniec gry</h2>

  <p style="text-align: center; font-weight: bold;">{{ message }}</p>

  {% if winner %}
  <p style="text-align: center; font-size: 1.15em;">
    Zwycięzcy: <strong>{{ winner_label }}</strong>
  </p>
  {% else %}
  <p style="text-align: center;">Brak rozstrzygnięcia.</p>
  {% endif %}

  <form method="post" action="{{ url_for('reset_game_and_go_index') }}">
    <button type="submit">Powrót do strony głównej</button>
  </form>
</div>
{% endblock %}
