{% extends "base.html" %}

{% block title %}Rejestracja{% endblock %}

{% block content %}

  <div class="container">
    <h2>Witamy w grze Blood on the clocktower!</h2>
    <p>Podaj swoje imię oraz numer miejsca, aby dołączyć do gry!</p>

    <div style="overflow-x:auto;">
      <p id="errorMsg" style="color: red; font-weight: bold; white-space: pre-line;"></p>
      <table>
        <tr>
          <td><label for="name">Nazwa gracza:</label></td>
          <td><input type="text" id="name" placeholder="Nazwa gracza" {% if name %}value="{{ name }}"{% endif %}></td>
        </tr>
        <tr>
          <td><label for="numer_miejsca">Numer miejsca:</label></td>
          <td><input type="number" id="numer_miejsca" min="1" placeholder="Gdzie siedzisz?" {% if numer_miejsca != "" %}value="{{ numer_miejsca }}"{% endif %}></td>
        </tr>
        <tr>
          <td colspan="2" style="text-align: left;">
            <label for="moderator_login">
              <input type="checkbox" id="moderator_login">
              Zaloguj jako moderator gry
            </label>
          </td>
        </tr>
        <tr id="moderatorPasswordRow" style="display: none;">
          <td><label for="moderator_password">Hasło moderatora:</label></td>
          <td><input type="password" id="moderator_password" placeholder="Podaj hasło"></td>
        </tr>
        <tr>
          <td colspan="2"><button id="saveBtn">Dołącz do gry</button></td>
        </tr>
      </table>
    </div>
  </div>

{% endblock %}

{% block scripts %}

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const moderatorCheckbox = document.getElementById("moderator_login");
    const passwordRow = document.getElementById("moderatorPasswordRow");
    const saveBtn = document.getElementById("saveBtn");
    const errorMsg = document.getElementById("errorMsg");
    localStorage.setItem("lastEventId", 0);

    // Pokazywanie / ukrywanie pola hasła
    moderatorCheckbox.addEventListener("change", () => {
      if (moderatorCheckbox.checked) {
        passwordRow.style.display = "table-row";
      } else {
        passwordRow.style.display = "none";
      }
    });

    // Obsługa kliknięcia przycisku
    saveBtn.addEventListener("click", async () => {
      errorMsg.textContent = "";

      const name = document.getElementById("name").value.trim();
      const numerMiejsca = document.getElementById("numer_miejsca").value;
      const isModerator = moderatorCheckbox.checked;
      const password = document.getElementById("moderator_password").value;

      // Walidacja
      if (!name) {
        errorMsg.textContent = "Podaj nazwę gracza.\n" +
        "Nazwa gracza nie może być pusta i musi być unikalna wśród obecnych graczy.";
        return;
      }

      if (!numerMiejsca) {
        errorMsg.textContent =
          "Podaj numer miejsca.\n" +
          "Numer miejsca musi być liczbą całkowitą większą niż 0\n" +
          "Miejsce nie może być zajęte przez innego gracza.";
        return;
      }

      if (isModerator && !password) {
        errorMsg.textContent = "Podaj hasło moderatora";
        return;
      }

      try {
        const response = await fetch("/save-player", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name: name,
            numer_miejsca: parseInt(numerMiejsca),
            moderator: isModerator,
            password: isModerator ? password : null
          })
        });

        if (response.redirected) {
          window.location.href = response.url;
          return;
        }

        let data = {};
        const contentType = response.headers.get("content-type") || "";
        if (contentType.includes("application/json")) {
          data = await response.json();
        }

        if (!response.ok) {
          errorMsg.textContent = data.error || "Wystąpił błąd";
          return;
        }

        errorMsg.style.color = "green";
        errorMsg.textContent = "Zapisano pomyślnie!";

      } catch (err) {
        errorMsg.textContent = "Błąd połączenia z serwerem";
        console.error(err);
      }
    });
  });
</script>

{% endblock %}
