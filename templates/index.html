{% extends "base.html" %}

{% block title %}Blood on the clocktower – Strona główna{% endblock %}

{% block content %}

  <div class="container">
    <h2>Witamy w grze Blood on the clocktower!</h2>
    <p>Podaj swoje imię oraz numer miejsca, aby dołączyć do gry!</p>

    <div style="overflow-x:auto;">
      <p id="errorMsg" style="color: red; font-weight: bold;"></p>
      <table>
        <tr>
          <td><label for="name">Imię:</label></td>
          <td><input type="text" id="name" placeholder="Twoje imię" {% if name %}value="{{ name }}"{% endif %}></td>
        </tr>
        <tr>
          <td><label for="numer_miejsca">Numer miejsca:</label></td>
          <td><input type="number" id="numer_miejsca" min="1" placeholder="Gdzie siedzisz?" {% if numer_miejsca != "" %}value="{{ numer_miejsca }}"{% endif %}></td>
        </tr>
        <tr>
          <td colspan="2" style="text-align: left;">
            <label for="moderator_login">
              <input type="checkbox" id="moderator_login">
              Zaloguj jako moderator gry
            </label>
          </td>
        </tr>
        <tr id="moderatorPasswordRow" style="display: none;">
          <td><label for="moderator_password">Hasło moderatora:</label></td>
          <td><input type="password" id="moderator_password" placeholder="Podaj hasło"></td>
        </tr>
        <tr>
          <td colspan="2"><button id="saveBtn">Dołącz do gry</button></td>
        </tr>
      </table>
    </div>

    <!-- <blockquote>„Księgi są zwierciadłami duszy – im spokojniej je czytasz, tym więcej widzisz.”</blockquote> -->
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const inputName = document.getElementById("name");
      const inputSeat = document.getElementById("numer_miejsca");
      const moderatorLoginCheckbox = document.getElementById("moderator_login");
      const moderatorPasswordRow = document.getElementById("moderatorPasswordRow");
      const moderatorPasswordInput = document.getElementById("moderator_password");
      const saveBtn = document.getElementById("saveBtn");
      const errorMsg = document.getElementById("errorMsg");

      moderatorLoginCheckbox.addEventListener("change", () => {
        const isModeratorLogin = moderatorLoginCheckbox.checked;
        moderatorPasswordRow.style.display = isModeratorLogin ? "table-row" : "none";
        if (!isModeratorLogin) {
          moderatorPasswordInput.value = "";
        }
      });

      const tryResumeSession = async () => {
        const activeClientId = window.clientId || clientId;
        if (!activeClientId) {
          return;
        }

        try {
          const response = await fetch("/resume-session", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ clientId: activeClientId })
          });

          if (response.redirected) {
            window.location.href = response.url;
          }
        } catch (err) {
          console.warn("Auto-resume session failed:", err);
        }
      };

      tryResumeSession();

      saveBtn.addEventListener("click", async () => {
        const name = inputName.value.trim();
        const numerMiejsca = inputSeat.value.trim();
        const isModeratorLogin = moderatorLoginCheckbox.checked;
        const moderatorPassword = moderatorPasswordInput.value.trim();
        const activeClientId = window.clientId || clientId;
        const activeSocket = window.socket;
        const socketSid = activeSocket && activeSocket.connected ? activeSocket.id : null;

        errorMsg.textContent = "";

        if (!name || !numerMiejsca) {
          errorMsg.textContent = "Podaj imię i numer miejsca, zanim zapiszesz!";
          return;
        }

        if (isModeratorLogin && !moderatorPassword) {
          errorMsg.textContent = "Podaj hasło moderatora.";
          return;
        }

        try {
          if (activeSocket && activeSocket.connected && activeClientId) {
            activeSocket.emit("client_id_response", { client_id: activeClientId });
          }

          const response = await fetch("/save-player", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name,
              numer_miejsca: numerMiejsca,
              moderator_login: isModeratorLogin,
              moderator_password: moderatorPassword,
              clientId: activeClientId,
              socketSid: socketSid
            })
          });

          if (!response.ok) {
            const res = await response.json().catch(() => ({}));
            errorMsg.textContent = res.error || "Nie udało się zapisać danych.";
            return;
          }

          if (response.redirected) {
            window.location.href = response.url;
          }
        } catch (err) {
          console.error(err);
          errorMsg.textContent = "Błąd połączenia z serwerem.";
        }
      });
    });
  </script>
{% endblock %}
