<div id="{{ id }}_wrapper" class="choice-container status-display" data-initial-options='{{ options | tojson }}'>
  {% if title %}
  <h3>{{ title }}</h3>
  {% endif %}



  <div id="{{ id }}_options" class="options"></div>
</div>

<script>
(function() {
  const wrapper = document.getElementById("{{ id }}_wrapper");

  const config = {
    id: "{{ id }}",
    activeLabel: "{{ active_label | default('Aktywne') }}",
    options: []
  };

  try {
    config.options = JSON.parse(wrapper.dataset.initialOptions || "[]");
  } catch (err) {
    console.warn("Nie udało się sparsować danych początkowych panelu statusu:", err);
    config.options = [];
  }

  const container = document.getElementById(config.id + "_options");
  const status = document.getElementById(config.id + "_status");
  function normalizeStatusOption(option) {
    if (Array.isArray(option)) {
      const display = option[0];
      const state = option.length > 1 ? option[1] : false;
      return {
        display: String(display ?? ""),
        isActive: Boolean(state)
      };
    }

    if (option && typeof option === "object") {
      const display = option.description ?? option.players ?? option.display ?? option.label ?? option.text ?? option.name ?? option.value;
      const state = option.status ?? option.active ?? option.is_active ?? option.isActive ?? option.state ?? false;
      return {
        display: String(display ?? ""),
        isActive: Boolean(state)
      };
    }

    return {
      display: String(option ?? ""),
      isActive: false
    };
  }

  function renderOptions(rawOptions) {
    const normalizedOptions = (rawOptions || []).map(normalizeStatusOption);
    container.innerHTML = "";

    if (normalizedOptions.length === 0) {
      status.innerText = "Brak danych statusu.";
      return;
    }

    normalizedOptions.forEach(option => {
      const div = document.createElement("div");
      div.classList.add("option");
      div.classList.add(option.isActive ? "selected" : "disabled");
      div.classList.add(option.isActive ? "status-true" : "status-false");
      div.innerText = option.display;

      container.appendChild(div);
    });

    const activeCount = normalizedOptions.filter(option => option.isActive).length;
    status.innerText = `${config.activeLabel}: ${activeCount} / ${normalizedOptions.length}`;
  }

  renderOptions(config.options);
})();

</script>
